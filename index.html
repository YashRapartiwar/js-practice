<!DOCTYPE html>
<html lang="en">
<head>
   <link href="https://your-font-link-here.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    *{
      margin : 0;
      padding : 0;
      font-family:"Gilroy", sans-serif;
      box-sizing: content-box;
    }
    html, 
    body{
      width: 100%;
      height:100%;
    }
    input{
      display: block;
    }
    #main{
      padding: 30px;
      width: 100%;
      height: 100%;
      background-color:rgb(134, 125, 143);
    }
    .card{
      max-width: 300px;
      color: #fff;
      margin-top: 40px;
      border-radius:10px ;
      display:inline-block;
      padding: 20px;
      border: 1px solid #555;
    }
     .profile{
      width:50px ;
      height: 50px;
      border-radius: 50%;
      margin-bottom: 7px;
      overflow: hidden;
    }
    .profile img{
      width: 100%;
      height: 100%;
      object-fit: cover;

    }
    .card h5{
      margin-top: 3px;
    }
    .card p{
      font-size: 12px;
      margin-top: 20px;
    }
    </style>
</head>
<body>
 <div id="main">
  <form action="">
    <input type="text" placeholder="profile pic">
    <input type="text" placeholder="Nickname">
    <input type="text" placeholder="Name">
    
    <input type="text" placeholder="Info">
    <input type="submit">
  </form>
  
 </div>
   <script src="script.js" defer></script>
</body>
</html>
